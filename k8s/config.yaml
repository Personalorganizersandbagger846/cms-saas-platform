apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-config
  namespace: cms
data:
  NODE_ENV: production
  DB_HOST: postgres.cms.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: cms
  REDIS_HOST: redis.cms.svc.cluster.local
  REDIS_PORT: "6379"
  ELASTICSEARCH_URL: http://elasticsearch.cms.svc.cluster.local:9200
---
apiVersion: v1
kind: Secret
metadata:
  name: cms-secrets
  namespace: cms
type: Opaque
stringData:
  DB_USER: cms
  DB_PASSWORD: CHANGE_ME_IN_PRODUCTION
  JWT_SECRET: CHANGE_ME_IN_PRODUCTION
  JWT_REFRESH_SECRET: CHANGE_ME_IN_PRODUCTION
  ENCRYPTION_KEY: CHANGE_ME_32_BYTES_HEX_STRING_HERE
  S3_ACCESS_KEY: CHANGE_ME
  S3_SECRET_KEY: CHANGE_ME
  OPENAI_API_KEY: CHANGE_ME
  SMTP_USER: CHANGE_ME
  SMTP_PASS: CHANGE_ME
