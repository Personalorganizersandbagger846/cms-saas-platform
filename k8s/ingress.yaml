apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cms-ingress
  namespace: cms
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/rate-limit: 'on'
    nginx.ingress.kubernetes.io/rate-limit-connections: '10'
    nginx.ingress.kubernetes.io/rate-limit-rps: '50'
spec:
  tls:
    - hosts:
        - cms.example.com
        - api.cms.example.com
      secretName: cms-tls
  rules:
    - host: cms.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  number: 80
    - host: api.cms.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
