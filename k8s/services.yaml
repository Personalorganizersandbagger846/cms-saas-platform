{{- $services := list
  (dict "name" "api-gateway" "port" 3000)
  (dict "name" "auth-service" "port" 3001)
  (dict "name" "user-service" "port" 3002)
  (dict "name" "tenant-service" "port" 3003)
  (dict "name" "content-service" "port" 3004)
  (dict "name" "media-service" "port" 3005)
  (dict "name" "comment-service" "port" 3006)
  (dict "name" "analytics-service" "port" 3007)
  (dict "name" "notification-service" "port" 3008)
  (dict "name" "search-service" "port" 3009)
  (dict "name" "workflow-service" "port" 3010)
  (dict "name" "plugin-service" "port" 3011)
  (dict "name" "feature-service" "port" 3012)
  (dict "name" "audit-service" "port" 3013)
  (dict "name" "settings-service" "port" 3014)
  (dict "name" "ai-service" "port" 3015)
