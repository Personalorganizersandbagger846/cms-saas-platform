# NOTE: This is a template reference. Actual K8s manifests below use plain YAML.
# Each service gets a Deployment + Service + HPA.

---
# ─── API Gateway ───────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: cms
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: cms/api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: cms-config
            - secretRef:
                name: cms-secrets
          env:
            - name: PORT
              value: "3000"
            - name: AUTH_SERVICE_URL
              value: http://auth-service.cms.svc.cluster.local:3001
            - name: USER_SERVICE_URL
              value: http://user-service.cms.svc.cluster.local:3002
            - name: TENANT_SERVICE_URL
              value: http://tenant-service.cms.svc.cluster.local:3003
            - name: CONTENT_SERVICE_URL
              value: http://content-service.cms.svc.cluster.local:3004
            - name: MEDIA_SERVICE_URL
              value: http://media-service.cms.svc.cluster.local:3005
            - name: COMMENT_SERVICE_URL
              value: http://comment-service.cms.svc.cluster.local:3006
            - name: ANALYTICS_SERVICE_URL
              value: http://analytics-service.cms.svc.cluster.local:3007
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service.cms.svc.cluster.local:3008
            - name: SEARCH_SERVICE_URL
              value: http://search-service.cms.svc.cluster.local:3009
            - name: WORKFLOW_SERVICE_URL
              value: http://workflow-service.cms.svc.cluster.local:3010
            - name: PLUGIN_SERVICE_URL
              value: http://plugin-service.cms.svc.cluster.local:3011
            - name: FEATURE_SERVICE_URL
              value: http://feature-service.cms.svc.cluster.local:3012
            - name: AUDIT_SERVICE_URL
              value: http://audit-service.cms.svc.cluster.local:3013
            - name: SETTINGS_SERVICE_URL
              value: http://settings-service.cms.svc.cluster.local:3014
            - name: AI_SERVICE_URL
              value: http://ai-service.cms.svc.cluster.local:3015
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: cms
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: cms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
