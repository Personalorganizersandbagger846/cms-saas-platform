name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cms_test
          POSTGRES_USER: cms
          POSTGRES_PASSWORD: test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cms"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Build packages
        run: pnpm turbo build

      - name: Test
        run: pnpm turbo test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cms_test
          DB_USER: cms
          DB_PASSWORD: test_secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - tenant-service
          - content-service
          - media-service
          - comment-service
          - analytics-service
          - notification-service
          - search-service
          - workflow-service
          - plugin-service
          - feature-service
          - audit-service
          - settings-service
          - ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.service
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/cms/${{ matrix.service }}:latest
            ${{ vars.REGISTRY_URL }}/cms/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push Admin Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/cms/admin:latest
            ${{ vars.REGISTRY_URL }}/cms/admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Update image tags
        run: |
          for manifest in k8s/namespace.yaml k8s/config.yaml k8s/infrastructure.yaml k8s/services.yaml k8s/ingress.yaml; do
            sed -i "s|:latest|:${{ github.sha }}|g" "$manifest"
          done

      - name: Deploy to staging
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/config.yaml
          kubectl apply -f k8s/infrastructure.yaml
          kubectl apply -f k8s/services.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway -n cms --timeout=300s
          kubectl rollout status deployment/auth-service -n cms --timeout=300s
          kubectl rollout status deployment/content-service -n cms --timeout=300s
          kubectl rollout status deployment/admin -n cms --timeout=300s

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

      - name: Update image tags
        run: |
          for manifest in k8s/namespace.yaml k8s/config.yaml k8s/infrastructure.yaml k8s/services.yaml k8s/ingress.yaml; do
            sed -i "s|:latest|:${{ github.sha }}|g" "$manifest"
          done

      - name: Deploy to production
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/config.yaml
          kubectl apply -f k8s/infrastructure.yaml
          kubectl apply -f k8s/services.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway -n cms --timeout=300s
          kubectl rollout status deployment/auth-service -n cms --timeout=300s
          kubectl rollout status deployment/content-service -n cms --timeout=300s
          kubectl rollout status deployment/admin -n cms --timeout=300s
